name: Install Linux Tauri dependencies
description: Install pinned WebKitGTK packages for reproducible Tauri Linux builds on Ubuntu 24.04.

runs:
  using: composite
  steps:
    - name: Install apt packages
      shell: bash
      run: |
        # Pin WebKitGTK 2.44.0-2 on Ubuntu 24.04 to avoid EGL_BAD_PARAMETER in shipped Linux binaries.
        # https://github.com/audioling/audioling/issues/40
        # https://github.com/OmniKee/OmniKee/blob/main/.github/workflows/release.yml
        sudo apt-get update
        sudo apt-get install -y \
          libwebkit2gtk-4.1-0=2.44.0-2 \
          libwebkit2gtk-4.1-dev=2.44.0-2 \
          libjavascriptcoregtk-4.1-0=2.44.0-2 \
          libjavascriptcoregtk-4.1-dev=2.44.0-2 \
          gir1.2-javascriptcoregtk-4.1=2.44.0-2 \
          gir1.2-webkit2-4.1=2.44.0-2 \
          libayatana-appindicator3-dev \
          librsvg2-dev \
          patchelf
